name: Release

on:
  push:
    tags:
      - 'v*'

# Sin este permiso, GitHub Actions no puede crear ni modificar releases
permissions:
  contents: write

jobs:
  # ── macOS: universal (arm64 + Intel) ─────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Mac universal
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Sube el instalador Y el feed de update (latest-mac.yml). Ese .yml es lo que
      # electron-updater lee para detectar versiones nuevas: sin él no hay aviso.
      - name: Upload Mac artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml
          generate_release_notes: true
          fail_on_unmatched_files: false

  # ── Windows: x64 (i3, i5, Ryzen, etc.) ───────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Windows x64
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Sube el instalador Y el feed de update (latest.yml). Sin latest.yml los
      # usuarios de Windows nunca reciben el aviso de actualización (era el bug de v1.0.6).
      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          fail_on_unmatched_files: false
